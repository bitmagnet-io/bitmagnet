fragment JSONSchemaTopLevel on JSONSchema {
  type
  default
  enum
  pattern
  required
  multipleOf
  maximum
  exclusiveMaximum
  minimum
  exclusiveMinimum
  maxLength
  minLength
  maxItems
  minItems
  uniqueItems
}

fragment JSONSchema on JSONSchema {
  ...JSONSchemaTopLevel
  items {
    ...JSONSchemaTopLevel
  }
}
