  FileType:
    model:
      - github.com/bitmagnet-io/bitmagnet/internal/model.FileType
      - github.com/bitmagnet-io/bitmagnet/internal/model.NullFileType
  Year:
    model:
      - github.com/bitmagnet-io/bitmagnet/internal/model.Year
  LanguageInfo:
