<ng-container *transloco="let t">
  <app-document-title [parts]="[t('routes.dashboard')]" />
  <mat-card class="dashboard-card">
    <mat-card-header>
      <mat-toolbar>
        <h2><mat-icon>manufacturing</mat-icon>Config</h2>
      </mat-toolbar>
    </mat-card-header>
    <mat-card-content>
      <mat-divider></mat-divider>
      <div class="grid-container">
        <mat-grid-list [cols]="breakpoints.sizeAtLeast('Medium') ? 2 : 1" rowHeight="600px">
          <mat-grid-tile [colspan]="1" [rowspan]="1">
            Hello
          </mat-grid-tile>
        </mat-grid-list>
      </div>
    </mat-card-content>
  </mat-card>
</ng-container>
